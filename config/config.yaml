delivery:
  email_to:
    - egedemirkapi@gmail.com
    - artunbatu@gmail.com
  digest_window_hours: 2
  schedule_cron: "0 */2 * * *"

# Proactive spoken briefing — the scheduler assembles the brief at this
# UTC hour and hands it to the Brain's speak queue; the voice tray reads
# it aloud (subject to its own quiet-hours in voice/config.yaml).
briefing:
  enabled: true
  hour: 6           # UTC hour (e.g. 6 UTC ≈ 9am in GMT+3)
  minute: 0

llm:
  enrichment_model: claude-haiku-4-5-20251001
  # Haiku 4.5 as analyst — MAX-plan Opus AND Sonnet quotas were both 429ing
  # because shared with Claude Code sessions. Haiku has much higher limits.
  # Quality is ~80% of Sonnet for ranking + 2-4 sentence "why it matters"
  # explanations, which is the actual job. Upgrade to claude-sonnet-4-6 or
  # claude-opus-4-7 once you're not actively running Claude Code sessions
  # (MAX quota refreshes hourly/daily).
  analyst_model: claude-haiku-4-5-20251001
  auth_mode: oauth_setup_token

scoring:
  ai_relevance_threshold: 0.3
  min_items_for_full_digest: 10
  top_n: 50

sources:
  enabled:
    # Tech news + aggregators
    - hn
    - product_hunt
    - google_news     # massive volume from 100s of publishers via search
    # Mainstream tech RSS
    - rss_techcrunch
    - rss_verge
    - rss_venturebeat
    - rss_yc
    - rss_openai
    - rss_deepmind
    - rss_stratechery
    - rss_pragmatic_engineer
    - rss_latent_space
    - rss_crunchbase
    # AI-specific newsletters
    - rss_simon_willison
    - rss_import_ai
    - rss_ai_snake_oil
    - rss_one_useful_thing
    # Reddit — communities discussing AI in real time
    - reddit_machinelearning
    - reddit_locallama
    - reddit_singularity
    - reddit_openai
    - reddit_anthropic
    - reddit_aiagents
    # User-defined
    - watchlist
    # Pain-source threads (Ask HN "what do you wish existed / biggest pain")
    # — feeds the Phase 8 proposer with unmet-need signal alongside tech.
    - pain_sources
    # Disabled (404):
    # - rss_a16z
    # - rss_anthropic
    # - rss_bens_bites   # feed.beehiiv.com/feed returns 404 since ~2026-05
