delivery:
  email_to: egedemirkapi@gmail.com
  digest_window_hours: 2
  schedule_cron: "0 */2 * * *"

llm:
  enrichment_model: claude-haiku-4-5-20251001
  # Sonnet 4.6 as analyst (not Opus) — MAX plan Opus quota is shared with
  # Claude Code chat sessions and 429s constantly when both are active.
  # Sonnet limits are far more generous and the ranking/explanation task
  # quality is nearly identical for this use case.
  analyst_model: claude-sonnet-4-6
  auth_mode: oauth_setup_token

scoring:
  ai_relevance_threshold: 0.3
  min_items_for_full_digest: 10
  top_n: 50

sources:
  enabled:
    - hn
    - product_hunt
    - rss_techcrunch
    - rss_verge
    - rss_venturebeat
    # - rss_a16z       # disabled: feed URL 404s (a16z removed the public RSS)
    - rss_yc
    # - rss_anthropic  # disabled: feed.xml 404s; revisit if Anthropic re-adds RSS
    - rss_openai
    - rss_deepmind
    - rss_stratechery
    - rss_pragmatic_engineer
    - rss_latent_space
    - rss_crunchbase
    - watchlist
