# Jarvis capability registry — bundled defaults.
#
# Edit ~/.jarvis/tools.toml to override per-user. Anything in user file
# wins; anything not mentioned in either file is denied by default.
#
# Wildcard suffix * is supported (longest-prefix match; deny wins ties).

# ── Internet ─────────────────────────────────────────────────────────
"web.fetch"               = "allow"
"web.search"              = "allow"

# ── Memory & intel (read-only over user's own data) ─────────────────
"memory.recall"           = "allow"
"memory.add_note"         = "allow"
"intel.query"             = "allow"

# ── Google Workspace — READ ONLY ─────────────────────────────────────
"gworkspace.read_calendar" = "allow"
"gworkspace.read_email"    = "allow"
"gworkspace.read_drive"    = "allow"

# ── Google Workspace — DENY (user keeps control of writes) ──────────
"gworkspace.send_email"    = "deny"
"gworkspace.modify_*"      = "deny"
"gworkspace.delete_*"      = "deny"

# ── Messaging ────────────────────────────────────────────────────────
"telegram.reply_to_user"   = "allow"
"telegram.send_to_others"  = "deny"

# ── Filesystem & shell (opt-in only) ─────────────────────────────────
"file.read"                = "allow"
"file.write"               = "deny"
"shell.exec"               = "deny"

# ── Jarvis Brain — read-only tools the chat LLM can call ─────────────
"agents.status"            = "allow"
"agents.tail"              = "allow"
"agents.run"               = "allow"   # explicit user request → fire backend agent
"ideas.list"               = "allow"
"ideas.show"               = "allow"
"ideas.refine"             = "allow"   # refine an existing candidate
"trends.latest"            = "allow"
"intel.recent"             = "allow"

# ── Workflow engine (Phase 14) ───────────────────────────────────────
"workflow.run"             = "allow"   # YAML workflows are user-defined
"workflow.list"            = "allow"   # read-only: list workflow names
"workflow.edit"            = "allow"   # dashboard routine editor: create/update/delete
"workflow.create"          = "allow"   # chat tool: build an automation from a request
"workflow.delete"          = "allow"   # chat tool: remove an automation
"tabs.open_set"            = "allow"   # opens predefined Chrome tabs
"apps.launch"              = "allow"   # gated per-app by ~/.jarvis/apps_allowed.json,
                                       #   not here — see workflows/actions/apps.py
"agent.run"                = "allow"   # workflow step → backend agent
"classroom.check"          = "allow"   # workflow step → Classroom read
"calendar.check"           = "allow"   # workflow step → Calendar read
"email.check"              = "allow"   # workflow step → Gmail read (metadata only)
"brief.compose"            = "allow"   # workflow step → assemble the daily brief
"speak"                    = "allow"   # workflow step → say a line aloud
"notify"                   = "allow"   # local desktop toast

# ── Briefing + context ───────────────────────────────────────────────
"brief.get"                = "allow"   # chat tool: read the current briefing
"context.app"              = "allow"   # chat tool: what app the user is in

# ── Chat: open things on command ─────────────────────────────────────
"apps.open"                = "allow"   # chat tool: launch a Windows app by name
"web.open"                 = "allow"   # chat tool: open a URL / website
"news.open"                = "allow"   # chat tool / routine step: open the top news articles
"news.email_digest"        = "allow"   # routine step: summarize news -> PDF -> email

# ── Browser navigator (in-app automation) ────────────────────────────
"browser.navigate"         = "allow"   # drive the browser to do a multi-step task
"browser.download"         = "allow"   # navigator action: save a triggered file
"browser.upload"           = "allow"   # navigator action: push files into a file input
"journey.run"              = "allow"   # multi-step orchestrator above the navigator

# ── OS / desktop (system-level changes — opt-in) ─────────────────────
# Default deny: changing the wallpaper / volume / etc. modifies the
# user's machine state. Flip to "allow" in ~/.jarvis/tools.toml to opt
# in once, or approve from the queue when first requested.
"os.set_wallpaper"         = "deny"

# ── Google Workspace — Classroom read added ──────────────────────────
"gworkspace.read_classroom" = "allow"
